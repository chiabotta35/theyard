services:
  web:
    build:
      context: .
      args:
        TASKIT_VERSION: "1.0.0"
    image: ghcr.io/chiabotta35/taskit:1.0.0
    container_name: taskit
    restart: unless-stopped
    pull_policy: missing
    ports:
      - "5000:5000"
    volumes:
      - ./data:/app/data
    environment:
      - SECRET_KEY=${SECRET_KEY:-change-me-in-production}
      - DATABASE_URL=sqlite:////app/data/taskit.db
      - ADMIN_USERNAME=${ADMIN_USERNAME:-admin}
      - ADMIN_EMAIL=${ADMIN_EMAIL:-admin@example.com}
      - ADMIN_PASSWORD=${ADMIN_PASSWORD:-changeme}
    deploy:
      resources:
        limits:
          memory: 512M
          cpus: "1.0"
